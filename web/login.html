<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>in sight · sign in</title>
  <link rel="stylesheet" href="/static/css/kiosk.css" />
  <style>
    .login-wrap { min-height: 100vh; display: grid; place-items: center; padding: var(--pad); }
    .login-card {
      width: min(380px, 100%); background: var(--surface); border: 1px solid var(--line);
      border-radius: var(--radius); padding: clamp(24px, 4vw, 40px);
    }
    .login-card h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: .3rem; }
    .login-card p { color: var(--muted); margin-bottom: 1.4rem; font-size: .95rem; }
    .login-card input {
      width: 100%; padding: .9rem 1rem; font-size: 1.05rem; color: var(--text);
      background: var(--surface-2); border: 1px solid var(--line); border-radius: 12px;
      margin-bottom: 1rem; outline: none;
    }
    .login-card input:focus { border-color: var(--accent); }
    .login-card button {
      width: 100%; padding: .9rem 1rem; font-size: 1.05rem; font-weight: 800;
      color: #1a1407; background: var(--accent); border: 0; border-radius: 12px; cursor: pointer;
    }
    .login-err { color: var(--hot); font-size: .9rem; margin-bottom: 1rem; display: none; }
    .login-err.show { display: block; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <form class="login-card" method="POST" action="/login">
      <h1>in sight</h1>
      <p>Enter your password to continue.</p>
      <div class="login-err" id="err">Wrong password — try again.</div>
      <input type="password" name="password" placeholder="Password" autofocus autocomplete="current-password" />
      <button type="submit">Sign in</button>
    </form>
  </div>
  <script>
    if (new URLSearchParams(location.search).get("e")) document.getElementById("err").classList.add("show");
  </script>
</body>
</html>
