<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>in sight · Projects</title>
  <link rel="stylesheet" href="/static/css/kiosk.css" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#0f1217" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="in sight" />
  <link rel="apple-touch-icon" href="/static/icon-192.png" />
  <link rel="icon" href="/static/icon.svg" type="image/svg+xml" />
</head>
<body>
  <div id="app">
    <header class="bar">
      <h1>Today's Projects <span class="sub">· in sight</span><span id="dot" class="status-dot"></span></h1>
      <div class="clock">
        <div class="time" id="time">--:--</div>
        <div class="date" id="date">—</div>
      </div>
    </header>

    <!-- Food-timing → focus suggestion (deep work vs. quick wins) -->
    <div id="focus-state"></div>

    <!-- The single most-urgent priority -->
    <section class="card focus" id="focus"></section>

    <!-- Top priorities (rest) + Waiting on you, side by side -->
    <div class="proj-row recede">
      <div class="proj-col">
        <div class="section-label">Top priorities</div>
        <div class="immediate-rail" id="immediate"></div>
      </div>
      <div class="proj-col" id="waiting-col">
        <div class="section-label">Waiting on you</div>
        <div id="waiting"></div>
      </div>
    </div>

    <!-- The user's milestones (team progress) -->
    <div class="recede">
      <div class="section-label" id="ms-label">Milestones · team progress</div>
      <div class="projects-grid" id="milestones"></div>
    </div>
  </div>

  <!-- Phone-only bottom nav (hidden on the wide kiosk) -->
  <nav class="phone-nav">
    <a href="/life" data-path="/life">Right now</a>
    <a href="/projects" data-path="/projects">Projects</a>
  </nav>

  <script type="module" src="/static/js/projects.js"></script>
</body>
</html>
