# in_sight configuration.
# Copy to config/config.yaml and edit. Keep config.yaml chmod 600 (it holds a password).

server:
  host: 0.0.0.0
  port: 8137
  refresh_seconds: 30          # how often the browser re-polls the API
  stale_after_seconds: 93600   # 26h — snapshot older than this shows a "stale" dot

# ── Screen 1: parallel projects + tasks ──────────────────────────────────────
# Pick where the Projects screen gets its data:
#   provider: local   → your own projects/tasks from knowledge/projects.yaml
#                       (the default — no account needed; edit it or use /setup)
#   provider: dverse  → sync live from a dVerse central command portal (needs an
#                       account; set base_url/email + INSIGHT_DVERSE_PASSWORD)
dverse:
  provider: local
  base_url: https://your-central-command.example.com
  email: you@example.com
  # Prefer the env var INSIGHT_DVERSE_PASSWORD over putting the password here.
  password: ""

# ── Google Calendar (appointments on the Life screen) ────────────────────────
# Two accounts supported. Setup (one time):
#   1. Google Cloud console → enable "Google Calendar API"; OAuth consent screen
#      (External) → add both your Google accounts as test users.
#   2. Create an OAuth client of type "Desktop app"; paste its id/secret below.
#   3. Authorize each account (mints a refresh token into config/google_tokens.json):
#        python scripts/gcal_auth.py "Personal"
#        python scripts/gcal_auth.py "Work"
# Leave enabled: false to turn the whole feature off.
google_calendar:
  enabled: false
  client_id: ""           # ...apps.googleusercontent.com
  client_secret: ""
  accounts:
    - {label: "Personal", color: "#6bd0a0"}   # label must match the auth command
    - {label: "Work",     color: "#6aa6ff"}

# ── Screen 2: life ───────────────────────────────────────────────────────────
# The life domain (fitness / food / house / travel) lives in the editable
# knowledge base, not here. Edit those files instead:
#   knowledge/fitness.yaml   knowledge/food.yaml
#   knowledge/house.yaml     knowledge/travel.yaml
# Each is merged in automatically (knowledge/<name>.yaml -> key <name>) and
# overrides anything you put under the same key here.
